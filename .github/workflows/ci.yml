name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Ensure only one CI workflow runs at a time per ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt
        run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9

  test:
    name: Test (${{ matrix.group.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: parser-models-errors
            packages: "./internal/parser/... ./internal/models/... ./internal/apperrors/..."
          - name: client
            packages: "./internal/client/..."
          - name: services-grpc-metrics
            packages: "./internal/services/... ./internal/grpc/... ./internal/metrics/..."
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: |
          gotestsum --junitfile junit-${{ matrix.group.name }}.xml --format testname -- -race -coverprofile=coverage-${{ matrix.group.name }}.txt -covermode=atomic ${{ matrix.group.packages }}

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ matrix.group.name }}
          path: |
            junit-${{ matrix.group.name }}.xml
            coverage-${{ matrix.group.name }}.txt

  test-cache:
    name: Test (cache)
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        env:
          REDIS_ADDRESS: localhost:6379
        run: |
          gotestsum --junitfile junit-cache.xml --format testname -- -race -coverprofile=coverage-cache.txt -covermode=atomic ./internal/cache/...

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-cache
          path: |
            junit-cache.xml
            coverage-cache.txt

  report:
    name: Report to Codecov
    runs-on: ubuntu-latest
    needs: [test, test-cache]
    if: ${{ !cancelled() }}
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: test-artifacts-*
          merge-multiple: true
          path: artifacts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: artifacts/coverage-parser-models-errors.txt,artifacts/coverage-client.txt,artifacts/coverage-services-grpc-metrics.txt,artifacts/coverage-cache.txt

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: artifacts/junit-parser-models-errors.xml,artifacts/junit-client.xml,artifacts/junit-services-grpc-metrics.xml,artifacts/junit-cache.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -o super-subtitles ./cmd/proxy

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: super-subtitles
          path: super-subtitles
          retention-days: 1
